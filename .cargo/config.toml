# Build a fully static binary by default: the musl target links libc statically,
# so the result is a single self-contained executable with no shared-library
# dependencies (ideal for dropping onto a server / running under stunnel/xinetd).
#
# Requires the target once:  rustup target add x86_64-unknown-linux-musl
# The binary lands at: target/x86_64-unknown-linux-musl/release/tiny-webdav
#
# For a dynamically linked glibc build instead, override on the command line:
#   cargo build --release --target x86_64-unknown-linux-gnu
[build]
target = "x86_64-unknown-linux-musl"
